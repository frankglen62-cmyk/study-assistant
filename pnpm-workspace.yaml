packages:
  - apps/*
  - packages/*

onlyBuiltDependencies:
  - esbuild
  - sharp

# Keep vulnerable transitive runtime packages on patched, API-compatible releases.
overrides:
  "form-data@>=4.0.0 <4.0.6": 4.0.6
  "js-yaml@>=4.0.0 <=4.1.1": 4.2.0
  "postcss@<8.5.10": 8.5.10
  "ws@>=8.0.0 <8.21.0": 8.21.0
